<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="50%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="dot-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#10b981" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="560" fill="url(#bg-grad)"/>
  <rect width="800" height="560" fill="url(#dot-pattern)"/>

  <!-- 边框 -->
  <rect x="20" y="20" width="760" height="520" fill="none" stroke="url(#accent-grad)" stroke-width="3" rx="16"/>
  <rect x="32" y="32" width="736" height="496" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.3" rx="12"/>

  <!-- 装饰：神经网络小图标 -->
  <g transform="translate(60, 100)" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.4">
    <circle cx="0" cy="0" r="6" fill="#10b981" fill-opacity="0.3"/>
    <circle cx="0" cy="40" r="6" fill="#10b981" fill-opacity="0.3"/>
    <circle cx="40" cy="20" r="6" fill="#10b981" fill-opacity="0.3"/>
    <circle cx="80" cy="0" r="6" fill="#10b981" fill-opacity="0.3"/>
    <circle cx="80" cy="40" r="6" fill="#10b981" fill-opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="20"/>
    <line x1="0" y1="40" x2="40" y2="20"/>
    <line x1="40" y1="20" x2="80" y2="0"/>
    <line x1="40" y1="20" x2="80" y2="40"/>
  </g>

  <!-- 右侧装饰：另一组网络 -->
  <g transform="translate(660, 380)" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.4">
    <circle cx="0" cy="0" r="6" fill="#0ea5e9" fill-opacity="0.3"/>
    <circle cx="40" cy="20" r="6" fill="#0ea5e9" fill-opacity="0.3"/>
    <circle cx="80" cy="0" r="6" fill="#0ea5e9" fill-opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="20"/>
    <line x1="40" y1="20" x2="80" y2="0"/>
    <line x1="0" y1="0" x2="80" y2="0"/>
  </g>

  <!-- 角装饰 -->
  <g fill="#10b981" fill-opacity="0.3">
    <circle cx="50" cy="50" r="4"/>
    <circle cx="750" cy="50" r="4"/>
    <circle cx="50" cy="510" r="4"/>
    <circle cx="750" cy="510" r="4"/>
  </g>
</svg>
