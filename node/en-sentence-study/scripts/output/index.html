<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakFlow - 英语口语练习</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-bg: #eef2ff;
            --border: #e2e8f0;
            --divider: #f1f5f9;
        }
        .dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-bg: #1e1b4b;
            --border: #334155;
            --divider: #252f3f;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }
        .bg-theme-primary { background-color: var(--bg-primary); }
        .bg-theme-secondary { background-color: var(--bg-secondary); }
        .bg-theme-tertiary { background-color: var(--bg-tertiary); }
        .bg-theme-accent { background-color: var(--accent-bg); }
        .text-theme-primary { color: var(--text-primary); }
        .text-theme-secondary { color: var(--text-secondary); }
        .text-theme-muted { color: var(--text-muted); }
        .text-theme-accent { color: var(--accent); }
        .border-theme { border-color: var(--border); }
        .bg-accent { background-color: var(--accent); }
        .hover\:bg-accent:hover { background-color: var(--accent-hover); }
        .hover\:text-accent:hover { color: var(--accent); }
        .hover\:bg-accent-light:hover { background-color: var(--accent-bg); }

        .divide-theme > :not(:last-child) {
            border-color: var(--divider);
        }

    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="app">
        <!-- Header -->
        <header class="bg-theme-secondary border-b border-theme text-theme-primary py-4 px-6 shadow-md" style="border-color: var(--border);">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <router-link to="/" class="text-xl font-semibold cursor-pointer no-underline text-theme-primary hover:text-accent">SpeakFlow</router-link>
                <div class="flex items-center gap-4">
                    <span class="text-theme-muted text-sm hidden sm:inline">英语口语练习</span>
                    <button @click="toggleTheme" class="p-2 rounded-lg hover:bg-theme-tertiary transition-colors" :title="isDark ? '切换到亮色模式' : '切换到暗色模式'">
                        <svg v-if="isDark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg v-else class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 py-6 px-4">
            <div class="max-w-4xl mx-auto">
                <!-- Loading -->
                <div v-if="loading" class="text-center py-12">
                    <div class="inline-block w-8 h-8 border-4 border-theme-tertiary border-t-accent rounded-full animate-spin"></div>
                    <p class="mt-3 text-theme-muted">加载中...</p>
                </div>

                <!-- Error -->
                <div v-else-if="error" class="text-center py-12">
                    <p class="text-red-500">{{ error }}</p>
                    <button @click="loadData" class="mt-4 px-4 py-2 bg-accent text-white rounded hover:bg-accent-hover transition-colors">
                        重试
                    </button>
                </div>

                <!-- Router View -->
                <router-view v-else v-slot="{ Component }">
                    <component :is="Component" :sentences-data="sentencesData" :grouped-sentences="groupedSentences" :is-dark="isDark" />
                </router-view>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-theme-secondary border-t py-4 px-6 text-center" style="border-color: var(--border);">
            <p class="text-theme-muted text-sm">SpeakFlow - 让英语口语学习更简单</p>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const { createRouter, createWebHashHistory } = VueRouter;

        // 解析 sentences.txt
        const parseSentences = (text) => {
            const lines = text.trim().split('\n');
            const result = [];
            for (const line of lines) {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length === 4) {
                    result.push({
                        id: parseInt(parts[0]),
                        scene: parts[1],
                        task: parts[2],
                        sentenceZh: parts[3]
                    });
                }
            }
            return result;
        };

        // Home 组件
        const Home = {
            props: ['groupedSentences', 'sentencesData', 'isDark'],
            template: `
                <div class="space-y-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-medium text-theme-primary">场景列表</h2>
                        <span class="text-sm text-theme-muted">{{ sentencesData.length }} 个句子</span>
                    </div>

                    <div v-for="scene in groupedSentences" :key="scene.name" class="bg-theme-secondary rounded-lg shadow-sm border border-theme overflow-hidden" style="border-color: var(--border);">
                        <div class="bg-theme-tertiary px-4 py-3 border-b" style="border-color: var(--border);">
                            <h3 class="font-medium text-theme-primary">{{ scene.name }}</h3>
                            <p class="text-sm text-theme-muted">{{ scene.nameEn }}</p>
                        </div>
                        <div class="divide-y divide-theme" >
                            <div  v-for="task in scene.tasks" :key="task.name"
                                 class="px-4 py-3 flex items-center justify-between hover:bg-theme-accent cursor-pointer transition"
                                 @click="$router.push('/task/' + encodeURIComponent(scene.name) + '/' + encodeURIComponent(task.name))">
                                <div>
                                    <span class="text-theme-primary">{{ task.name }}</span>
                                    <span v-if="task.nameEn" class="text-theme-muted mx-2">|</span>
                                    <span class="text-theme-muted text-sm">{{ task.nameEn }}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="bg-accent text-white text-xs px-2 py-1 rounded-full">
                                        {{ task.sentences.length }}
                                    </span>
                                    <svg class="w-4 h-4 text-theme-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `
        };

        // Task 组件
        const TaskView = {
            props: ['groupedSentences', 'sentencesData', 'isDark'],
            template: `
                <div class="space-y-4">
                    <nav class="flex items-center text-sm text-theme-muted mb-4">
                        <router-link to="/" class="cursor-pointer hover:text-accent no-underline text-theme-muted">首页</router-link>
                        <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        <span class="text-accent">{{ scene.name }}</span>
                        <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        <span class="text-accent">{{ task.name }}</span>
                    </nav>

                    <div class="bg-theme-secondary rounded-lg shadow-sm border border-theme overflow-hidden" style="border-color: var(--border);">
                        <div class="bg-theme-tertiary px-4 py-3 border-b" style="border-color: var(--border);">
                            <h3 class="font-medium text-theme-primary">{{ task.name }}</h3>
                            <p class="text-sm text-theme-muted">{{ task.nameEn }}</p>
                        </div>
                        <div class="divide-y divide-theme">
                            <div v-for="item in task.sentences" :key="item.id"
                                 class="px-4 py-3 flex items-center justify-between hover:bg-theme-accent cursor-pointer transition"
                                 @click="$router.push('/sentence/' + item.id)">
                                <span class="text-theme-primary">{{ item.sentenceZh }}</span>
                                <svg class="w-4 h-4 text-theme-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            computed: {
                scene() {
                    const sceneName = decodeURIComponent(this.$route.params.scene);
                    return this.groupedSentences.find(s => s.name === sceneName) || { name: '', nameEn: '', tasks: [] };
                },
                task() {
                    const taskName = decodeURIComponent(this.$route.params.task);
                    return this.scene.tasks?.find(t => t.name === taskName) || { name: '', nameEn: '', sentences: [] };
                }
            }
        };

        // Sentence 组件
        const SentenceView = {
            props: ['groupedSentences', 'sentencesData', 'isDark'],
            template: `
                <div class="space-y-4">
                    <div v-if="loading" class="text-center py-12">
                        <div class="inline-block w-8 h-8 border-4 border-theme-tertiary border-t-accent rounded-full animate-spin"></div>
                        <p class="mt-3 text-theme-muted">加载中...</p>
                    </div>

                    <div v-else-if="data" class="space-y-4">
                        <nav class="flex items-center text-sm text-theme-muted mb-4">
                            <router-link to="/" class="cursor-pointer hover:text-accent no-underline text-theme-muted">首页</router-link>
                            <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                            <router-link :to="'/task/' + encodeURIComponent(data.scene) + '/' + encodeURIComponent(data.task)" class="cursor-pointer hover:text-accent no-underline text-accent">{{ data.scene }}</router-link>
                            <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                            <span class="text-accent">{{ data.task }}</span>
                        </nav>

                        <div class="bg-theme-secondary rounded-lg shadow-lg border border-theme overflow-hidden" style="border-color: var(--border);">
                            <div class="bg-theme-tertiary text-theme-primary px-6 py-4">
                                <h2 class="text-xl font-medium">{{ data.sentenceZh }}</h2>
                            </div>

                            <div class="p-6 space-y-6">
                                <div v-if="data.context" class="bg-theme-accent rounded-lg p-4">
                                    <p class="text-sm text-theme-muted mb-1">上下文背景</p>
                                    <p class="text-theme-primary">{{ data.context }}</p>
                                </div>

                                <div>
                                    <h3 class="font-medium text-theme-primary mb-3">英文表达</h3>
                                    <div class="space-y-4">
                                        <div v-for="(t, index) in data.translations" :key="index"
                                             class="border border-theme rounded-lg p-4" style="border-color: var(--border);">
                                            <div class="flex items-start justify-between mb-2">
                                                <span class="text-lg text-theme-primary">{{ t.sentence }}</span>
                                                <span class="text-xs px-2 py-1 rounded"
                                                      :class="{
                                                          'bg-accent text-white': t.style === 'polite',
                                                          'bg-blue-500 text-white': t.style === 'neutral',
                                                          'bg-purple-500 text-white': t.style === 'casual'
                                                      }">
                                                    {{ t.style }}
                                                </span>
                                            </div>
                                            <p class="text-sm text-theme-muted mb-2">{{ t.phonetic }}</p>
                                            <p class="text-theme-secondary text-sm mb-2">{{ t.literalTranslation }}</p>
                                            <p class="text-theme-muted text-sm">{{ t.note }}</p>
                                        </div>
                                    </div>
                                </div>

                                <div v-if="data.explanation" class="bg-theme-tertiary rounded-lg p-4">
                                    <p class="text-sm text-theme-muted mb-1">讲解</p>
                                    <p class="text-theme-primary">{{ data.explanation }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            data() {
                return {
                    loading: true,
                    data: null
                };
            },
            watch: {
                '$route.params.id': {
                    handler(newId) {
                        this.loadSentence(newId);
                    },
                    immediate: true
                }
            },
            methods: {
                async loadSentence(id) {
                    this.loading = true;
                    this.data = null;
                    try {
                        const res = await fetch('./' + id + '.json');
                        if (res.ok) {
                            const json = await res.json();
                            this.data = {
                                scene: json.scene_zh,
                                task: json.task_zh,
                                sentenceZh: json.sentence_zh,
                                context: json.context,
                                translations: json.translations.map(t => ({
                                    sentence: t.sentence,
                                    style: t.style,
                                    note: t.note,
                                    literalTranslation: t.literal_translation,
                                    phonetic: t.phonetic
                                })),
                                explanation: json.explanation
                            };
                        }
                    } catch (e) {
                        console.error(e);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        };

        // 路由配置
        const routes = [
            { path: '/', component: Home },
            { path: '/task/:scene/:task', component: TaskView },
            { path: '/sentence/:id', component: SentenceView }
        ];

        // 创建路由
        const router = createRouter({
            history: createWebHashHistory(),
            routes
        });

        // 创建 App
        const app = createApp({
            setup() {
                const loading = ref(true);
                const error = ref(null);
                const sentencesData = ref([]);
                const isDark = ref(false);

                // 按场景和任务分组
                const groupedSentences = computed(() => {
                    const groups = {};
                    for (const item of sentencesData.value) {
                        const key = item.scene;
                        if (!groups[key]) {
                            groups[key] = { name: item.scene, nameEn: '', tasks: {} };
                        }
                        const taskKey = item.task;
                        if (!groups[key].tasks[taskKey]) {
                            groups[key].tasks[taskKey] = { name: taskKey, nameEn: '', sentences: [] };
                        }
                        groups[key].tasks[taskKey].sentences.push(item);
                    }

                    const result = [];
                    for (const [, sceneData] of Object.entries(groups)) {
                        const tasks = [];
                        for (const [, taskData] of Object.entries(sceneData.tasks)) {
                            tasks.push({
                                name: taskData.name,
                                nameEn: taskData.nameEn || '',
                                sentences: taskData.sentences
                            });
                        }
                        result.push({ name: sceneData.name, nameEn: sceneData.nameEn || '', tasks });
                    }
                    return result;
                });

                const toggleTheme = () => {
                    isDark.value = !isDark.value;
                    document.documentElement.classList.toggle('dark', isDark.value);
                    localStorage.setItem('theme', isDark.value ? 'dark' : 'light');
                };

                // 加载数据
                const loadData = async () => {
                    loading.value = true;
                    error.value = null;
                    try {
                        const response = await fetch('./sentences.txt');
                        if (!response.ok) throw new Error('Failed to load');
                        const text = await response.text();
                        sentencesData.value = parseSentences(text);
                        loading.value = false;
                    } catch (e) {
                        error.value = '加载数据失败，请稍后重试';
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    // 恢复主题设置
                    const saved = localStorage.getItem('theme');
                    if (saved === 'dark') {
                        isDark.value = true;
                        document.documentElement.classList.add('dark');
                    }
                    loadData();
                });

                return { loading, error, sentencesData, groupedSentences, loadData, isDark, toggleTheme };
            }
        });

        app.use(router);
        app.mount('#app');
    </script>
</body>
</html>
