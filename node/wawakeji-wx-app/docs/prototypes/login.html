<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录/注册 - 程序员英语阅读 App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center space-x-2 mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
          <span class="text-white text-2xl">📚</span>
        </div>
        <span class="text-2xl font-bold text-gray-900">DevReader</span>
      </div>
      <p class="text-gray-600">登录账户，继续阅读</p>
    </div>

    <!-- Login Form -->
    <div class="bg-white rounded-2xl shadow-sm p-8">
      <!-- Tab Switcher -->
      <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
        <button id="loginTab" class="flex-1 py-2 px-4 bg-white text-gray-900 font-medium rounded-lg shadow-sm">
          登录
        </button>
        <button id="registerTab" class="flex-1 py-2 px-4 text-gray-600 font-medium rounded-lg">
          注册
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
          <input type="email" placeholder="your@email.com"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" placeholder="••••••••"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center">
            <input type="checkbox" class="w-4 h-4 text-blue-500 border-gray-300 rounded focus:ring-blue-500">
            <span class="ml-2 text-sm text-gray-600">记住我</span>
          </label>
          <a href="#" class="text-sm text-blue-500 hover:text-blue-600">忘记密码？</a>
        </div>
        <button type="submit" class="w-full py-3 bg-blue-500 text-white font-semibold rounded-xl hover:bg-blue-600 transition-colors">
          登录
        </button>
      </form>

      <!-- Register Form (Hidden) -->
      <form id="registerForm" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
          <input type="text" placeholder="你的昵称"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
          <input type="email" placeholder="your@email.com"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" placeholder="至少 8 位"
                 class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit" class="w-full py-3 bg-blue-500 text-white font-semibold rounded-xl hover:bg-blue-600 transition-colors">
          创建账户
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-gray-500">或其他登录方式</span>
        </div>
      </div>

      <!-- Social Login -->
      <div class="space-y-3">
        <button class="w-full flex items-center justify-center space-x-3 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#07C160" d="M18.7002 10.875V9.6C18.7002 6.5 17.0002 4.80005 13.9002 4.80005H10.1002C6.8002 4.80005 5.0002 6.60005 5.0002 9.80005V14.4C5.0002 17.6 6.8002 19.4 10.0002 19.4H10.9002C10.9002 19.4 11.4002 19.4 13.3002 19.4C13.9002 19.4 14.5002 19.2 15.0002 18.9V20.2H17.9002V14.7C17.9002 14.7 18.7002 12.8 18.7002 10.875ZM13.1002 15.7H10.9002C9.0002 15.7 8.0002 14.7 8.0002 12.8V11.3C8.0002 9.5 9.0002 8.5 10.9002 8.5H13.2002C15.0002 8.5 16.0002 9.4 16.0002 11.3V11.6H11.0002V13.6H16.0002C15.9002 14.9 15.0002 15.7 13.1002 15.7Z"/>
          </svg>
          <span class="font-medium text-gray-700">微信登录</span>
        </button>
        <button class="w-full flex items-center justify-center space-x-3 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span class="font-medium text-gray-700">Facebook</span>
        </button>
        <button class="w-full flex items-center justify-center space-x-3 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z"/>
            <path fill="#34A853" d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.823l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"/>
            <path fill="#4A90E2" d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.16 2.854-2.394 3.558L19.834 21Z"/>
            <path fill="#FBBC05" d="M5.277 14.268A7.12 7.12 0 0 1 4.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 0 0 0 12c0 1.92.445 3.73 1.237 5.335l4.04-3.067Z"/>
          </svg>
          <span class="font-medium text-gray-700">Google</span>
        </button>
      </div>
    </div>

    <!-- Back to Home -->
    <div class="text-center mt-6">
      <a href="landing.html" class="text-gray-600 hover:text-gray-900 text-sm">
        ← 返回首页
      </a>
    </div>
  </div>

  <script>
    // Tab switching logic
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('bg-white', 'shadow-sm');
      loginTab.classList.remove('text-gray-600');
      registerTab.classList.remove('bg-white', 'shadow-sm');
      registerTab.classList.add('text-gray-600');
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
    });

    registerTab.addEventListener('click', () => {
      registerTab.classList.add('bg-white', 'shadow-sm');
      registerTab.classList.remove('text-gray-600');
      loginTab.classList.remove('bg-white', 'shadow-sm');
      loginTab.classList.add('text-gray-600');
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
    });
  </script>
</body>
</html>
