<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    body {
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8C8 100%);
      font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #333333;
      position: relative;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.8) 100%);
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .header-logo {
      font-size: 28px;
      margin-right: 16px;
    }

    .header-app-name {
      font-size: 32px;
      color: #333333;
      font-weight: bold;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 40px;
      padding-top: 140px;
      display: flex;
      flex-direction: column;
    }

    .header-section {
      text-align: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 36px;
      color: #4A90A4;
      font-weight: bold;
    }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .original-card {
      background: rgba(255,255,255,0.85);
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #4A90A4;
      flex-shrink: 0;
      max-height: 160px;
      overflow: hidden;
    }

    .original-text {
      font-size: 22px;
      color: #555555;
      line-height: 1.5;
    }

    .grammar-section {
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 16px;
      border: 2px solid rgba(255,107,107,0.4);
      flex: 1;
      overflow: hidden;
    }

    .grammar-title {
      font-size: 30px;
      font-weight: bold;
      color: #FF6B6B;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grammar-list {
      overflow-y: auto;
      max-height: calc(100% - 50px);
    }

    .grammar-item {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,107,107,0.2);
    }

    .grammar-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .grammar-rule {
      font-size: 24px;
      font-weight: bold;
      color: #FF6B6B;
    }

    .grammar-exp {
      font-size: 22px;
      color: #333333;
      margin-top: 8px;
      line-height: 1.5;
    }

    .grammar-example {
      font-size: 18px;
      color: #666666;
      font-style: italic;
      margin-top: 6px;
      padding: 8px;
      background: rgba(255,107,107,0.1);
      border-radius: 6px;
    }

    .subtitle-container {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 30px;
    }

    .subtitle-text {
      font-size: 24px;
      color: #ffffff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
      line-height: 1.5;
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(0deg, rgba(74,144,164,0.95) 0%, rgba(74,144,164,0.7) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-slogan {
      font-size: 24px;
      color: #ffffff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    #audio {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">📚</div>
    <div class="header-app-name">English Reader</div>
  </div>

  <div class="container">
    <div class="header-section">
      <div class="section-label">{{partLabel}}</div>
    </div>

    <div class="content-area">
      <div class="original-card">
        <div class="original-text">{{originalText}}</div>
      </div>

      <div class="grammar-section">
        <div class="grammar-title">💡 语法解析</div>
        <div class="grammar-list">
          {{grammarItemsHtml}}
        </div>
      </div>
    </div>
  </div>

  <div class="subtitle-container">
    <div id="subtitle" class="subtitle-text"></div>
  </div>

  <div class="footer">
    <div class="footer-slogan">让学习成为乐趣</div>
  </div>

  <audio id="audio" src="file://{{audioPath}}"></audio>

  <script>
    const audioEl = document.getElementById('audio');
    const subtitleEl = document.getElementById('subtitle');

    const sentences = {{sentencesJson}};

    function updateSubtitle(currentTime) {
      for (let i = 0; i < sentences.length; i++) {
        if (currentTime >= sentences[i].start && currentTime < sentences[i].end) {
          if (subtitleEl.dataset.sentenceIndex != i) {
            subtitleEl.textContent = sentences[i].text;
            subtitleEl.dataset.sentenceIndex = i;
          }
          return;
        }
      }
      subtitleEl.textContent = '';
    }

    audioEl.addEventListener('timeupdate', () => {
      updateSubtitle(audioEl.currentTime);
    });

    audioEl.addEventListener('loadedmetadata', () => {
      audioEl.play().catch(() => {});
    });

    document.addEventListener('DOMContentLoaded', () => {
      audioEl.play().catch(() => {});
    });
  </script>
</body>
</html>
