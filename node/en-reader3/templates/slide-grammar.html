<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    body {
      background: linear-gradient(180deg, #FAFAFA 0%, #F5F5F5 100%);
      font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #333333;
      position: relative;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, #FFFFFF 0%, #F8F8F8 100%);
      border-bottom: 1px solid #E8E8E8;
      display: flex;
      align-items: center;
      padding: 0 40px;
      z-index: 10;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      margin-right: 16px;
      background: linear-gradient(135deg, #6B8E8E 0%, #7BA3A3 100%);
      border-radius: 8px;
    }

    .header-app-name {
      font-size: 32px;
      color: #333333;
      font-weight: bold;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 40px;
      padding-top: 140px;
      display: flex;
      flex-direction: column;
    }

    .header-section {
      text-align: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 36px;
      color: #6B8E8E;
      font-weight: bold;
    }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .original-card {
      background: rgba(255,255,255,0.85);
      border-radius: 12px;
      padding: 16px;
      border-left: 4px solid #6B8E8E;
      flex-shrink: 0;
      max-height: 160px;
      overflow: hidden;
    }

    .original-text {
      font-size: 22px;
      color: #555555;
      line-height: 1.5;
    }

    .grammar-section {
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 16px;
      border: 2px solid rgba(107,142,142,0.4);
      flex: 1;
      overflow: hidden;
    }

    .grammar-title {
      font-size: 30px;
      font-weight: bold;
      color: #6B8E8E;
      margin-bottom: 16px;
    }

    .grammar-list {
      overflow-y: auto;
      max-height: calc(100% - 50px);
    }

    .grammar-item {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(107,142,142,0.2);
    }

    .grammar-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .grammar-rule {
      font-size: 24px;
      font-weight: bold;
      color: #6B8E8E;
    }

    .grammar-exp {
      font-size: 22px;
      color: #333333;
      margin-top: 8px;
      line-height: 1.5;
    }

    .grammar-example {
      font-size: 18px;
      color: #666666;
      font-style: italic;
      margin-top: 6px;
      padding: 8px;
      background: rgba(107,142,142,0.1);
      border-radius: 6px;
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(0deg, #6B8E8E 0%, #7BA3A3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-slogan {
      font-size: 24px;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"></div>
    <div class="header-app-name">English Reader</div>
  </div>

  <div class="container">
    <div class="header-section">
      <div class="section-label">{{partLabel}}</div>
    </div>

    <div class="content-area">
      <div class="original-card">
        <div class="original-text">{{originalText}}</div>
      </div>

      <div class="grammar-section">
        <div class="grammar-title">语法解析</div>
        <div class="grammar-list">
          {{grammarItemsHtml}}
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-slogan">让学习成为乐趣</div>
  </div>
</body>
</html>
