<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    body {
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D8C8 100%);
      font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #333333;
      position: relative;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.8) 100%);
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .header-logo {
      font-size: 28px;
      margin-right: 16px;
    }

    .header-app-name {
      font-size: 32px;
      color: #333333;
      font-weight: bold;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 60px;
      padding-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .section-label {
      font-size: 34px;
      color: #4A90A4;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .original-text {
      font-size: 46px;
      color: #333333;
      line-height: 1.8;
      text-align: center;
      max-width: 900px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .subtitle-container {
      position: absolute;
      bottom: 100px;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 40px;
    }

    .subtitle-text {
      font-size: 32px;
      color: #ffffff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
      line-height: 1.6;
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(0deg, rgba(74,144,164,0.95) 0%, rgba(74,144,164,0.7) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-slogan {
      font-size: 24px;
      color: #ffffff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    #audio {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">📚</div>
    <div class="header-app-name">English Reader</div>
  </div>

  <div class="container">
    <div class="section-label">{{partLabel}}</div>
    <div class="original-text">{{originalText}}</div>
  </div>

  <div class="subtitle-container">
    <div id="subtitle" class="subtitle-text"></div>
  </div>

  <div class="footer">
    <div class="footer-slogan">让学习成为乐趣</div>
  </div>

  <audio id="audio" src="file://{{audioPath}}"></audio>

  <script>
    const audioEl = document.getElementById('audio');
    const subtitleEl = document.getElementById('subtitle');

    const sentences = {{sentencesJson}};

    function updateSubtitle(currentTime) {
      for (let i = 0; i < sentences.length; i++) {
        if (currentTime >= sentences[i].start && currentTime < sentences[i].end) {
          if (subtitleEl.dataset.sentenceIndex != i) {
            subtitleEl.textContent = sentences[i].text;
            subtitleEl.dataset.sentenceIndex = i;
          }
          return;
        }
      }
      subtitleEl.textContent = '';
    }

    audioEl.addEventListener('timeupdate', () => {
      updateSubtitle(audioEl.currentTime);
    });

    audioEl.addEventListener('loadedmetadata', () => {
      audioEl.play().catch(() => {});
    });

    document.addEventListener('DOMContentLoaded', () => {
      audioEl.play().catch(() => {});
    });
  </script>
</body>
</html>
