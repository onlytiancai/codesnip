<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    body {
      background: linear-gradient(180deg, #FAFAFA 0%, #F5F5F5 100%);
      font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #333333;
      position: relative;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, #FFFFFF 0%, #F8F8F8 100%);
      border-bottom: 1px solid #E8E8E8;
      display: flex;
      align-items: center;
      padding: 0 40px;
      z-index: 10;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      margin-right: 16px;
      background: linear-gradient(135deg, #6B8E8E 0%, #7BA3A3 100%);
      border-radius: 8px;
    }

    .header-app-name {
      font-size: 32px;
      color: #333333;
      font-weight: bold;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 60px;
      padding-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .thank-you {
      font-size: 80px;
      font-weight: bold;
      color: #6B8E8E;
      margin-bottom: 40px;
    }

    .outro-text {
      font-size: 38px;
      color: #333333;
      text-align: center;
      max-width: 800px;
      line-height: 1.8;
      margin-bottom: 60px;
    }

    .encouragement {
      font-size: 28px;
      color: #6B8E8E;
      text-align: center;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(0deg, #6B8E8E 0%, #7BA3A3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-slogan {
      font-size: 24px;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"></div>
    <div class="header-app-name">English Reader</div>
  </div>

  <div class="container">
    <div class="thank-you">Thank You</div>
    <div class="outro-text">{{outroText}}</div>
    <div class="encouragement">感谢观看，期待下次相见！</div>
  </div>

  <div class="footer">
    <div class="footer-slogan">让学习成为乐趣</div>
  </div>
</body>
</html>
